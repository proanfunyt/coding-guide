    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #7dd3fc;
            --code-bg: #0f172a;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 0;
        }

        section {
            background-color: var(--card-bg);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: var(--accent-color);
            margin-top: 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        h3 {
            color: #f8fafc;
            margin-top: 20px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        ul, ol {
            color: var(--text-muted);
            padding-left: 20px;
            font-size: 1.1rem;
        }

        li {
            margin-bottom: 10px;
        }

        code {
            background-color: var(--code-bg);
            color: #f472b6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
        }

        pre {
            background-color: var(--code-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            border: 1px solid #334155;
            overflow-x: auto;
        }

        pre code {
            color: #38bdf8;
            background-color: transparent;
            padding: 0;
        }

        .important-note {
            background-color: rgba(56, 189, 248, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            margin: 20px 0;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            background-color: var(--accent-color);
            color: #0f172a !important;
            padding: 12px 24px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            text-decoration: none;
        }

        .btn.outline {
            background-color: transparent;
            color: var(--accent-color) !important;
            border: 2px solid var(--accent-color);
        }

        .btn.outline:hover {
            background-color: var(--accent-color);
            color: #0f172a !important;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--card-bg);
            color: var(--text-muted);
            font-style: normal;
        }
    </style>
